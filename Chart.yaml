  repository: oci://registry.rc.nectar.org.au/nectar-helm
- name: mariadb
  version: 26.2.0
  repository: oci://registry-1.docker.io/bitnamicharts
  condition: components.mariadb
- name: rabbitmq
  version: 16.0.14
  repository: oci://registry-1.docker.io/bitnamicharts
  condition: components.rabbitmq
- name: memcached
  version: 8.7.0
  repository: oci://registry-1.docker.io/bitnamicharts
  condition: components.memcached
